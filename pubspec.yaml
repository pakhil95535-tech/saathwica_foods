name: saathwica_foods
description: Premium Natural Food E-Commerce App with Multi-User Support
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  get: ^4.6.5
  provider: ^6.0.0
  intl: ^0.19.0
  cached_network_image: ^3.3.0
  carousel_slider: ^5.0.0
  smooth_page_indicator: ^1.1.0
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0
  google_maps_flutter: ^2.5.0
  geolocator: ^9.0.2
  uuid: ^4.0.0
  path_provider: ^2.1.0
  sqflite: ^2.3.0
  http: ^1.1.0
  image_picker: ^1.0.0
  permission_handler: ^12.0.1
  badges: ^3.1.1
  lottie: ^2.6.0
  animations: ^2.0.10
  fluttertoast: ^8.2.2
  connectivity_plus: ^5.0.1
  shared_preferences: ^2.2.0
  firebase_core: ^4.4.0
  cloud_firestore: ^6.1.2
  firebase_auth: ^6.1.4
  firebase_messaging: ^16.1.1
  flutter_launcher_icons: "^0.13.1"
  flutter_secure_storage: ^10.0.0
  jwt_decoder: ^2.0.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icons/new_logo.png"
  min_sdk_android: 21                   

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/

